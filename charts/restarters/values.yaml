# Default values for restarters.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: restarters_prod  # Update this to your actual image
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

setup:
  migrate: "true"
  seedSkills: "false"
  # USE WITH CAUTION! This will truncate the skills table and re-seed it with the skills.json file
  # seedingTruncateSkills: "false
  createAdminUser: "false"
  adminName: "Restarters Admin"
  adminEmail: "admin@example.com"
  adminPassword: "changeMeASAP"
  adminRole: "2"
  skillsJson: ""
  # Example skills JSON
  # skillsJson: |
    # {
    #   "1": [
    #     { "skill_name": "Advertising", "description": "Promoting products" },
    #     { "skill_name": "Marketing" }
    #   ],
    #   "2": [
    #     { "skill_name": "Repair", "description": "Fixing things" }
    #   ]
    # }

# Nginx sidecar configuration
nginx:
  enabled: true
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 50m
    #   memory: 64Mi

# MySQL database configuration
mysql:
  enabled: true
  image:
    repository: mysql
    tag: "5.7.33"
    pullPolicy: IfNotPresent
  auth:
    rootPassword: "s3cr3t_prod"
    database: "restarters_prod"
    username: "restarters_user"
    password: "restarters_pass"
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 250m
    #   memory: 256Mi
  config: |
    [mysqld]
    # Ignore lost+found directory that may exist in persistent volumes
    ignore-db-dir=lost+found
    
    # Use explicit defaults for timestamp to avoid deprecation warnings
    explicit_defaults_for_timestamp=1
    
    # Basic MySQL configuration
    default-storage-engine=innodb
    innodb_buffer_pool_size=128M
    max_allowed_packet=64M
    
    # Character set configuration
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    
    # Logging
    log-error=/var/log/mysql/error.log
    
    [mysql]
    default-character-set=utf8mb4
    
    [client]
    default-character-set=utf8mb4

# Application environment configuration
env:
  # Application settings
  APP_NAME: "Restarters Production"
  APP_ENV: "production"
  APP_KEY: "base64:V7Xk5bSPf2okepdpDnXScE8kdWXwlAte4kXXpoK2+3I="
  APP_DEBUG: "false"
  APP_URL: "http://localhost:8080"
  APP_SHOW_BRANCH: "false"
  APP_SHOW_COMMUNITY_TEST: "false"
  APP_INSTANCE: "fixitclinic"

  # Feature flags
  FEATURE__IMAGE_UPLOAD: "false"
  FEATURE__MATOMO_INTEGRATION: "false"
  FEATURE__WORDPRESS_INTEGRATION: "false"
  FEATURE__WIKI_INTEGRATION: "false"
  FEATURE__DISCOURSE_INTEGRATION: "false"

  # Logging
  LOG_CHANNEL: "stack"

  # Database (will be overridden if mysql.enabled is true)
  DB_CONNECTION: "mysql"
  DB_HOST: "restarters-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "restarters_prod"
  DB_USERNAME: "restarters_user"
  DB_PASSWORD: "restarters_pass"

  # Session and cache
  BROADCAST_CONNECTION: "log"
  CACHE_STORE: "file"
  SESSION_DRIVER: "file"
  SESSION_COOKIE: "restarters_session"
  SESSION_SECURE_COOKIE: "false"
  SESSION_DOMAIN: ""
  SESSION_LIFETIME: "120"
  SESSION_TABLE: "sessions"
  QUEUE_CONNECTION: "sync"

  # Sanctum
  SANCTUM_STATEFUL_DOMAINS: "localhost:8080"

  # Redis
  REDIS_HOST: "127.0.0.1"
  REDIS_PASSWORD: "null"
  REDIS_PORT: "6379"

  # Mail
  MAIL_MAILER: "smtp"
  MAIL_HOST: "mailpit"
  MAIL_PORT: "1025"
  MAIL_USERNAME: "null"
  MAIL_PASSWORD: "null"
  MAIL_SCHEME: "null"

  # Pusher
  PUSHER_APP_ID: ""
  PUSHER_APP_KEY: ""
  PUSHER_APP_SECRET: ""
  PUSHER_APP_CLUSTER: "mt1"

  # Mix
  MIX_PUSHER_APP_KEY: ""
  MIX_PUSHER_APP_CLUSTER: "mt1"

  # Table names
  TBL_USERS: "users"
  TBL_GROUPS: "groups"
  TBL_EVENTS: "events"
  TBL_DEVICES: "devices"
  TBL_IMAGES: "images"
  TBL_LINKS: "links"

  # Device status
  DEVICE_FIXED: "1"
  DEVICE_REPAIRABLE: "2"
  DEVICE_DEAD: "3"

  # Categories
  MISC_CATEGORY_ID: "46"
  MISC_CATEGORY_ID_POWERED: "46"
  MISC_CATEGORY_ID_UNPOWERED: "999"

  # Environmental
  DISPLACEMENT_VALUE: "0.3"
  EMISSION_RATIO_UNPOWERED: ""

  # WordPress integration
  WP_XMLRPC_ENDPOINT: ""
  WP_XMLRPC_USER: ""
  WP_XMLRPC_PSWD: ""

  # Wiki integration
  WIKI_URL: ""
  WIKI_DB: ""
  WIKI_USER: ""
  WIKI_PASSWORD: ""
  WIKI_APIUSER: ""
  WIKI_APIPASSWORD: ""
  WIKI_COOKIE_PREFIX: ""
  WIKI_HOST: ""

  # Discourse integration
  DISCOURSE_SECRET: ""
  DISCOURSE_URL: ""
  DISCOURSE_APIUSER: ""
  DISCOURSE_APIKEY: ""

  # External services
  REPAIRDIRECTORY_URL: ""
  MAPBOX_TOKEN: ""
  GOOGLE_ANALYTICS_TRACKING_ID: ""
  GOOGLE_TAG_MANAGER_ID: ""
  GOOGLE_API_CONSOLE_KEY: ""

  # Monitoring
  SEND_COMMAND_LOGS_TO: ""
  CALENDAR_HASH: ""
  SENTRY_LARAVEL_DSN: ""
  SENTRY_TRACES_SAMPLE_RATE: "0.1"

  # Security
  HONEYPOT_DISABLE: "false"
