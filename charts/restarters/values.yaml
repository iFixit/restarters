# Default values for restarters.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: nginx
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# Additional volumes on the output Deployment definition.
volumes: []

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

# MySQL database configuration
mysql:
  enabled: true
  image:
    repository: mysql
    tag: "5.7"
    pullPolicy: IfNotPresent
  auth:
    rootPassword: "s3cr3t_prod"
    database: "restarters_prod"
    username: "restarters_user"
    password: "restarters_pass"
  persistence:
    enabled: false
    size: 8Gi
    storageClass: ""
  resources:
    {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 250m
    #   memory: 256Mi
  config: |
    [mysqld]
    # Ignore lost+found directory that may exist in persistent volumes
    ignore-db-dir=lost+found

    # Use explicit defaults for timestamp to avoid deprecation warnings
    explicit_defaults_for_timestamp=1

    # Basic MySQL configuration
    default-storage-engine=innodb
    innodb_buffer_pool_size=128M
    max_allowed_packet=64M

    # Character set configuration
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

    # Logging
    log-error=/var/log/mysql/error.log

    [mysql]
    default-character-set=utf8mb4

    [client]
    default-character-set=utf8mb4

# Application environment configuration
env:
  # Application settings
  APP_NAME: "Restarters Production"
  APP_ENV: "production"
  APP_KEY: "" # One needs to be generated before hand
  APP_DEBUG: "false"
  APP_URL: "http://localhost:8001"
  APP_SHOW_BRANCH: "false"
  APP_SHOW_COMMUNITY_TEST: "false"
  APP_INSTANCE: "base"

  # Feature flags
  FEATURE__IMAGE_UPLOAD: "false"
  FEATURE__MATOMO_INTEGRATION: "false"
  FEATURE__WORDPRESS_INTEGRATION: "false"
  FEATURE__WIKI_INTEGRATION: "false"
  FEATURE__DISCOURSE_INTEGRATION: "false"

  # Logging
  LOG_CHANNEL: "stack"

  # Database (will be overridden if mysql.enabled is true)
  DB_CONNECTION: "mysql"
  DB_HOST: "restarters-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "restarters_prod"
  DB_USERNAME: "restarters_user"
  DB_PASSWORD: "restarters_pass"

  # Session and cache
  BROADCAST_CONNECTION: "log"
  CACHE_STORE: "file"
  SESSION_DRIVER: "file"
  SESSION_COOKIE: "restarters_session"
  SESSION_SECURE_COOKIE: "false"
  SESSION_DOMAIN: ""
  SESSION_LIFETIME: "120"
  SESSION_TABLE: "sessions"
  QUEUE_CONNECTION: "sync"

  # Sanctum
  SANCTUM_STATEFUL_DOMAINS: ""

  # Redis
  REDIS_HOST: "127.0.0.1"
  REDIS_PASSWORD: "null"
  REDIS_PORT: "6379"

  # Mail
  MAIL_MAILER: "smtp"
  MAIL_HOST: "mailpit"
  MAIL_PORT: "1025"
  MAIL_USERNAME: "null"
  MAIL_PASSWORD: "null"
  MAIL_SCHEME: "null"

  # Pusher
  PUSHER_APP_ID: ""
  PUSHER_APP_KEY: ""
  PUSHER_APP_SECRET: ""
  PUSHER_APP_CLUSTER: "mt1"

  # Mix
  MIX_PUSHER_APP_KEY: ""
  MIX_PUSHER_APP_CLUSTER: "mt1"

  # Table names
  TBL_USERS: "1"
  TBL_GROUPS: "2"
  TBL_EVENTS: "3"
  TBL_DEVICES: "4"
  TBL_IMAGES: "5"
  TBL_LINKS: "6"

  # Device status
  DEVICE_FIXED: "1"
  DEVICE_REPAIRABLE: "2"
  DEVICE_DEAD: "3"

  # Categories
  MISC_CATEGORY_ID: "46"
  MISC_CATEGORY_ID_POWERED: "46"
  MISC_CATEGORY_ID_UNPOWERED: "50"

  # Environmental
  DISPLACEMENT_VALUE: "0.5"
  EMISSION_RATIO_UNPOWERED: "17.70147059"
  EMISSION_RATIO_POWERED: "32.06679233"

  # WordPress integration
  WP_XMLRPC_ENDPOINT: ""
  WP_XMLRPC_USER: ""
  WP_XMLRPC_PSWD: ""

  # Wiki integration
  WIKI_URL: ""
  WIKI_DB: ""
  WIKI_USER: ""
  WIKI_PASSWORD: ""
  WIKI_APIUSER: ""
  WIKI_APIPASSWORD: ""
  WIKI_COOKIE_PREFIX: ""
  WIKI_HOST: ""

  # Discourse integration
  DISCOURSE_SECRET: ""
  DISCOURSE_URL: ""
  DISCOURSE_APIUSER: ""
  DISCOURSE_APIKEY: ""

  # External services
  REPAIRDIRECTORY_URL: ""
  MAPBOX_TOKEN: ""
  GOOGLE_ANALYTICS_TRACKING_ID: ""
  GOOGLE_TAG_MANAGER_ID: ""
  GOOGLE_API_CONSOLE_KEY: ""

  # Monitoring
  SEND_COMMAND_LOGS_TO: ""
  CALENDAR_HASH: ""
  SENTRY_LARAVEL_DSN: ""
  SENTRY_TRACES_SAMPLE_RATE: "1"

  # Security
  HONEYPOT_DISABLE: "false"
  L5_SWAGGER_GENERATE_ALWAYS: "false"

  # Meta
  META_TWITTER_SITE: ""
  META_TWITTER_IMAGE_ALT: ""
