apiVersion: v1
kind: Service
metadata:
  name: {{ include "restarters.fullname" . }}-app
  labels:
    {{- include "restarters.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "restarters.selectorLabels" . | nindent 4 }}