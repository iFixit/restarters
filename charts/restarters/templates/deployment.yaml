apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "restarters.fullname" . }}
  labels:
    {{- include "restarters.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "restarters.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "restarters.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Copy public files to shared volume
        - name: copy-public-files
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['sh', '-c', 'cp -r /var/www/public/* /shared-public/ 2>/dev/null || true']
          volumeMounts:
            - name: public-files
              mountPath: /shared-public
        
        # Fix storage directory permissions
        - name: fix-storage-permissions
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: 
            - /bin/sh
            - -c
            - |
              echo "Setting up storage directory structure and permissions..."
              
              # Create all necessary directories in the mounted storage volume
              mkdir -p /var/www/storage/framework/sessions
              mkdir -p /var/www/storage/framework/views
              mkdir -p /var/www/storage/framework/cache/data
              mkdir -p /var/www/storage/app/public
              mkdir -p /var/www/storage/logs
              
              # Create uploads directory in public volume
              mkdir -p /var/www/public/uploads
              
              # Set ownership and permissions for storage directory
              chown -R 33:33 /var/www/storage
              chmod -R 755 /var/www/storage
              
              # Make sure logs directory is writable
              chmod -R 777 /var/www/storage/logs
              
              # Set permissions for uploads directory
              chown -R 33:33 /var/www/public/uploads
              chmod -R 755 /var/www/public/uploads
              
              echo "Storage permissions setup complete"
          securityContext:
            runAsUser: 0  # Run as root to fix permissions
          volumeMounts:
            - name: storage-pvc
              mountPath: /var/www/storage
              subPath: storage
            - name: public-files
              mountPath: /var/www/public
      containers:
        # Main Restarters PHP-FPM container
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: php-fpm
              containerPort: 9000
              protocol: TCP
          env:
            - name: MIGRATE
              value: "{{ .Values.setup.migrate | default "false" }}"
            - name: SEEDING_TRUNCATE_SKILLS
              value: "{{ .Values.setup.seedingTruncateSkills | default "false" }}"
            - name: SEED_SKILLS
              value: "{{ .Values.setup.seedSkills | default "false" }}"
            - name: CREATE_ADMIN_USER
              value: "{{ .Values.setup.createAdminUser | default "false" }}"
            - name: ADMIN_NAME
              value: "{{ .Values.setup.adminName | default "Restarters Admin" }}"
            - name: ADMIN_EMAIL
              value: "{{ .Values.setup.adminEmail | default "admin@example.com" }}"
            - name: ADMIN_PASSWORD
              value: "{{ .Values.setup.adminPassword | default "changeMeASAP" }}"
            - name: ADMIN_ROLE
              value: "{{ .Values.setup.adminRole | default "2" }}"
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/healthcheck.sh
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/healthcheck.sh
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: env-config
              mountPath: /var/www/.env
              subPath: .env
              readOnly: true
            - name: public-files
              mountPath: /var/www/public
            {{- if .Values.skillsJson }}
            - name: skills-json-config
              mountPath: /var/www/config/skills.json
              subPath: skills.json
              readOnly: true
            {{- end }}
            - name: storage-pvc
              mountPath: /var/www/storage
              subPath: storage
            {{- with .Values.volumeMounts }}
            {{- range . }}
            {{- if ne .name "env-config" }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- end }}
            {{- end }}
        
        {{- if .Values.nginx.enabled }}
        # Nginx sidecar container
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: public-files
              mountPath: /var/www/public
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
        {{- end }}
      
      volumes:
        - name: env-config
          configMap:
            name: {{ include "restarters.fullname" . }}-env-config
        - name: public-files
          emptyDir: {}
        {{- if .Values.skillsJson }}
        - name: skills-json-config
          configMap:
            name: {{ include "restarters.fullname" . }}-skills-json-config
        {{- end }}
        {{- if .Values.nginx.enabled }}
        - name: nginx-config
          configMap:
            name: {{ include "restarters.fullname" . }}-nginx-config
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: storage-pvc
          persistentVolumeClaim:
            claimName: {{ include "restarters.fullname" . }}-storage-pvc
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
