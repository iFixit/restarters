{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "restarters.fullname" . }}-nginx-config
  labels:
    {{- include "restarters.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen {{ .Values.service.port }};
        server_name _;
        root /var/www/public;
        index index.php index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        {{- if .Values.nginx.security.csp.enabled }}
        add_header Content-Security-Policy "{{ .Values.nginx.security.csp.policy }}" always;
        {{- end }}

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;

        # Nginx-only health check endpoint (no PHP-FPM dependency)
        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # Handle Laravel routes (including /healthz)
        location / {
            try_files $uri $uri/ @php;
        }

        # PHP-FPM configuration with better error handling
        location @php {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
            fastcgi_param REQUEST_URI $uri;
            fastcgi_param QUERY_STRING $query_string;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
            # Add timeout and error handling
            fastcgi_connect_timeout 5s;
            fastcgi_send_timeout 10s;
            fastcgi_read_timeout 10s;
            # Better error handling
            fastcgi_intercept_errors on;
        }

        # Directly handle PHP files
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Handle static files
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Hide nginx version
        server_tokens off;

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }

        # Deny access to sensitive files
        location ~ /(?:\.env|\.git|composer\.(json|lock)|package\.(json|lock)|yarn\.lock) {
            deny all;
        }

        # Logging
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
    }
{{- end }}
