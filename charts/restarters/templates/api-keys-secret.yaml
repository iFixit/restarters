{{- if and .Values.secrets.enabled .Values.secrets.createSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.secretName }}
  labels:
    {{- include "restarters.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded values - these should be overridden in production
  {{ .Values.secrets.keys.mapboxToken }}: {{ .Values.secrets.data.mapboxToken | b64enc | quote }}
  {{ .Values.secrets.keys.googleApiKey }}: {{ .Values.secrets.data.googleApiKey | b64enc | quote }}
{{- end }} 